name: CD - 构建验证

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 构建应用
      run: npm run build
      env:
        NODE_ENV: production

    - name: 构建成功通知
      run: echo "✅ Mission Control 构建成功 - $(date)"
