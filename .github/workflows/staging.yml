name: Staging - 预发布验证

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]

jobs:
  staging-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 构建（Staging 模式）
      run: npm run build
      env:
        NODE_ENV: staging

    - name: ✅ Staging 构建完成
      run: echo "Staging build passed at $(date)"
